services:
  db:
    image: postgres:16-alpine
    container_name: portfolio_db
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 3s
      timeout: 3s
      retries: 15

  migrate:
    build:
      context: .
      target: builder   # uses the builder stage which has all node_modules + prisma CLI + tsx
    container_name: portfolio_migrate
    command: >
      sh -c "npx prisma db push --accept-data-loss && npx prisma db seed"
    env_file: .env.test
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    container_name: portfolio_app
    ports:
      - "3001:3000"
    env_file: .env.test
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
